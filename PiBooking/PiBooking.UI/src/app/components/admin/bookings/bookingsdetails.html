<template>
    <require from="../../gotoroute/gotoroute"></require>
    <br />
    <div class="alert alert-info" role="alert">Please enter the engineer information below. </div>
    <div if.bind="errors"  id="errors" role="alert" class="alert alert-danger">${errors}</div>
    <div if.bind="message" class="alert alert-success" role="alert">${message}</div>
    <form role="form">
        <div class="form-group">
            <label class="control-label" for="EngineerID">Engineer ID</label>
            <input value.bind="engineer.EngineerID & validate & debounce" type="text" class="form-control" id="EngineerID" readonly>
        </div>  
        <div class="form-group">
            <label class="control-label" for="FirstName">First Name</label>
            <input value.bind="engineer.FirstName & validate & debounce" type="text" class="form-control" id="FirstName" placeholder="Enter first name">
        </div>
        <div class="form-group">
            <label class="control-label" for="LastName">Last Name</label>
            <input value.bind="engineer.LastName & validate & debounce" type="text" class="form-control" id="LastName" placeholder="Enter last name">
        </div>
        <div class="form-group">
            <label class="control-label" for="EmployeeID">Employee ID</label>
            <input value.bind="engineer.EmployeeID & validate & debounce" type="text" class="form-control" id="EmployeeID" placeholder="Enter employee id">
        </div> 
        <div class="form-group">
            <label class="control-label" for="Phone">Phone</label>
            <input value.bind="engineer.Phone & validate & debounce" type="tel" class="form-control" id="Phone" placeholder="Enter phone">
        </div>
        <div class="form-group">
            <label class="control-label" for="Email">Email address</label>
            <input value.bind="engineer.Email & validate & debounce" type="email" class="form-control" id="Email" placeholder="Enter email">
        </div>
    </form>
    <div id="navigation" class="row paddingtop10">
        <div class="col-sm-12  btn-group">
            <button go-to-route="route: engineers" class="btn btn-default minimumwidth15em "><span class="glyphicon glyphicon-arrow-left"></span>Back</button>
            <button click.delegate="Save()" class="btn btn-default minimumwidth15em" disabled.bind="!canSave"><i class="fas fa-save"></i>Save</button>
        </div>
    </div>
</template>
